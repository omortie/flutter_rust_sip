name: flutter_rust_sip
description: "Use PJSIP in Flutter via Rust FFI"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.2+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.11.1
  freezed_annotation: '>=3.0.0'
  hooks: ^1.0.2
  native_toolchain_rust: ^1.0.3
  rxdart: ^0.28.0

dev_dependencies:
  ffi: ^2.1.3
  ffigen: ^13.0.0
  freezed: '>=3.0.0'
  build_runner: ^2.11.1
  flutter_lints: ^5.0.0
  
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
